<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Subject Analysis Database</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'IBM Plex Mono',monospace;
}

body{

background:#050505;
overflow:hidden;
color:#d7d7d7;

}

.screen{

position:fixed;
inset:0;

display:flex;
justify-content:flex-start;
align-items:flex-start;

background:#050505;

}

.bootContainer{

padding:80px;

max-width:800px;

font-size:15px;

line-height:2.1;

white-space:pre-line;

}

@media(max-width:700px){

.bootContainer{

padding:30px;

font-size:13px;

}

}

</style>

</head>

<body>

<div class="screen">

<div
class="bootContainer"
id="bootText">
</div>

</div>

<script>

const lines = [

{
text:
"SUBJECT ANALYSIS DATABASE\n",
delay:4500
},

{
text:
"INITIALIZING...\n",
delay:4000
},

{
text:
"loading records...\n",
delay:3500
},

{
text:
"[ OK ]\n",
delay:1500
},

{
text:
"recovering archives...\n",
delay:3500
},

{
text:
"[ OK ]\n",
delay:1500
},

{
text:
"cross-checking evidence...\n",
delay:4500
},

{
text:
"[ OK ]\n",
delay:1500
},

{
text:
"Last updated:\ntoday\n",
delay:2000
},

{
text:
"analyzing subject...\n",
delay:4000
},

{
text:
"subject found.\n",
delay:2500
},

{
text:
"ACCESS GRANTED.\n",
delay:3500
}

];

const box =
document.getElementById(
"bootText"
);

let index = 0;

function typeNext(){

if(index < lines.length){

box.innerHTML +=
lines[index].text;

const wait =
lines[index].delay;

index++;

setTimeout(
typeNext,
wait
);

}

else{

  box.innerHTML +=
"\nlaunching interface...";

setTimeout(()=>{

box.innerHTML +=
"\n\n";

},2500);

setTimeout(()=>{

window.location.href =
"./menu.html";

},5000);

}

}

typeNext();

</script>

</body>
</html>
