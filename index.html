<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Subject Analysis Database</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
'IBM Plex Mono',
monospace;
}

body{

background:#050505;
overflow:hidden;
color:#d7d7d7;

}

.screen{

position:fixed;
inset:0;

display:flex;
justify-content:flex-start;
align-items:flex-start;

background:#050505;

}

.bootContainer{

padding:80px;

max-width:800px;

font-size:15px;

line-height:2.1;

white-space:pre-line;

}

@media(max-width:700px){

.bootContainer{

padding:30px;

font-size:13px;

}

}

</style>

</head>

<body>

<div class="screen">

<div
class="bootContainer"
id="bootText">
</div>

</div>

<script>

const lines = [

"SUBJECT ANALYSIS DATABASE\n",

"INITIALIZING...\n",

"loading records...\n[ OK ]\n",

"recovering archives...\n[ OK ]\n",

"cross-checking evidence...\n[ OK ]\n",

"Last updated:\ntoday\n",

"analyzing subject...\n",

"subject found.\n",

"ACCESS GRANTED."

];

const box =
document.getElementById(
"bootText"
);

let index = 0;

function typeNext(){

if(index < lines.length){

box.innerHTML +=
lines[index];

index++;

setTimeout(
typeNext,
650
);

}

else{

setTimeout(()=>{

window.location.href =
"./menu.html";

},1200);

}

}

typeNext();

</script>

</body>
</html>
